---
- name: Setup Python Web App on EC2
  hosts: webservers
  become: yes
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Python and Flask
      apt:
        name:
          - python3
          - python3-flask
        state: present

    - name: Create a directory for our app
      file:
        path: /opt/webapp
        state: directory
        owner: ubuntu

    - name: Copy app.py to the server
      copy:
        src: app.py
        dest: /opt/webapp/app.py
        owner: ubuntu

    - name: Create a systemd service to keep the app running
      copy:
        dest: /etc/systemd/system/webapp.service
        content: |
          [Unit]
          Description=Simple Flask Web App
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/opt/webapp
          ExecStart=/usr/bin/python3 /opt/webapp/app.py
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Start and enable the web application
      systemd:
        name: webapp
        state: restarted
        enabled: yes